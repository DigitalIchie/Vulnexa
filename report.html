<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vulnexa | Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tailwind.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark bg-canvas text-slate-100 antialiased">
  <div class="min-h-screen bg-gradient-to-br from-canvas via-[#0f1730] to-[#141c35]">
    <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      <header class="mb-6 rounded-2xl border border-slate-800/80 bg-panel/80 p-4 backdrop-blur">
        <div class="flex flex-wrap items-center justify-between gap-4">
          <div class="flex items-center gap-3">
            <img src="vulnexa-logo.png" alt="Vulnexa logo" class="h-14 w-14 rounded-lg border border-cyan-300/30 bg-slate-950/60 p-1" />
            <div>
              <p class="text-xs leading-tight text-cyan-300">Vulnexa &mdash; Intelligent Vulnerability Discovery &amp; Attack Simulation</p>
              <h1 class="text-2xl font-bold">Security Report</h1>
            </div>
          </div>
          <nav class="flex flex-wrap gap-2 text-sm">
            <a class="nav-link" href="index.html">Dashboard</a>
            <a class="nav-link" href="new-scan.html">New Scan</a>
            <a class="nav-link" href="scan-results.html">Scan Results</a>
            <a class="nav-link active" href="report.html">Report</a>
            <a class="nav-link" href="admin.html">Admin</a>
          </nav>
          <div class="flex items-center gap-2">
            <span id="authStatus" class="badge badge-slate">Not Signed In</span>
            <button id="logoutBtn" class="btn-ghost hidden" type="button">Logout</button>
          </div>
        </div>
      </header>

      <main class="space-y-6">
        <section class="grid grid-cols-1 gap-4 md:grid-cols-3">
          <article class="card">
            <p class="card-label">Critical + High</p>
            <p id="reportHighCount" class="mt-3 text-3xl font-extrabold text-red-400">0</p>
          </article>
          <article class="card">
            <p class="card-label">Medium</p>
            <p id="reportMediumCount" class="mt-3 text-3xl font-extrabold text-amber-300">0</p>
          </article>
          <article class="card">
            <p class="card-label">Low</p>
            <p id="reportLowCount" class="mt-3 text-3xl font-extrabold text-emerald-300">0</p>
          </article>
        </section>

        <section class="card">
          <h2 class="text-lg font-semibold">Detailed Vulnerability Breakdown</h2>
          <div id="breakdownList" class="mt-4 space-y-3"></div>
        </section>

        <section class="card">
          <h2 class="text-lg font-semibold">Remediation Suggestions</h2>
          <ul id="remediationList" class="mt-4 space-y-3 text-sm text-slate-300"></ul>
        </section>
      </main>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
